<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluvio Orb Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      gap: 48px;
    }

    /* ── ORB CONTAINER ── */
    .orb-wrapper {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* outer ambient glow ring */
    .orb-glow {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(52,125,155,0.18) 0%, transparent 70%);
      transition: opacity 0.6s ease;
      opacity: 0;
    }

    /* middle ring — ripple */
    .orb-ripple {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(52,125,155,0.25);
      opacity: 0;
      transform: scale(1);
    }

    /* core orb sphere */
    .orb-core {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%,
        #5aafc7 0%,
        #347D9B 40%,
        #1b5470 75%,
        #0d2e3e 100%
      );
      box-shadow:
        0 0 0 0 rgba(52,125,155,0),
        inset 0 -8px 24px rgba(0,0,0,0.4),
        inset 0 4px 12px rgba(255,255,255,0.12);
      transition:
        box-shadow 0.4s ease,
        transform 0.4s ease;
    }

    /* specular highlight */
    .orb-core::before {
      content: '';
      position: absolute;
      top: 14px;
      left: 22px;
      width: 32px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      filter: blur(4px);
      transform: rotate(-30deg);
    }

    /* secondary smaller highlight */
    .orb-core::after {
      content: '';
      position: absolute;
      top: 22px;
      left: 28px;
      width: 12px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      filter: blur(2px);
      transform: rotate(-20deg);
    }

    /* ── STATE: IDLE — slow gentle breathe ── */
    .orb-wrapper.idle .orb-core {
      animation: orb-idle 4s ease-in-out infinite;
    }
    .orb-wrapper.idle .orb-glow {
      opacity: 1;
      animation: glow-idle 4s ease-in-out infinite;
    }

    @keyframes orb-idle {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 24px 4px rgba(52,125,155,0.25), inset 0 -8px 24px rgba(0,0,0,0.4), inset 0 4px 12px rgba(255,255,255,0.12); }
      50%       { transform: scale(1.04); box-shadow: 0 0 40px 10px rgba(52,125,155,0.35), inset 0 -8px 24px rgba(0,0,0,0.4), inset 0 4px 12px rgba(255,255,255,0.12); }
    }
    @keyframes glow-idle {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }

    /* ── STATE: LISTENING — faster breathe + ripple ── */
    .orb-wrapper.listening .orb-core {
      animation: orb-listen 1.6s ease-in-out infinite;
      background: radial-gradient(circle at 38% 35%,
        #7dc4d8 0%,
        #3d96b8 40%,
        #1e6580 75%,
        #0d2e3e 100%
      );
    }
    .orb-wrapper.listening .orb-glow {
      opacity: 1;
      animation: glow-listen 1.6s ease-in-out infinite;
      background: radial-gradient(circle, rgba(61,150,184,0.28) 0%, transparent 70%);
    }
    .orb-wrapper.listening .orb-ripple {
      animation: ripple-out 1.8s ease-out infinite;
    }

    @keyframes orb-listen {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 28px 6px rgba(61,150,184,0.3), inset 0 -8px 24px rgba(0,0,0,0.4), inset 0 4px 12px rgba(255,255,255,0.15); }
      50%       { transform: scale(1.07); box-shadow: 0 0 52px 16px rgba(61,150,184,0.45), inset 0 -8px 24px rgba(0,0,0,0.4), inset 0 4px 12px rgba(255,255,255,0.15); }
    }
    @keyframes glow-listen {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 1; }
    }
    @keyframes ripple-out {
      0%   { transform: scale(0.92); opacity: 0.5; }
      100% { transform: scale(1.55); opacity: 0; }
    }

    /* ── STATE: TALKING — energetic burst + multi-layer glow ── */
    .orb-wrapper.talking .orb-core {
      animation: orb-talk 0.9s ease-in-out infinite alternate;
      background: radial-gradient(circle at 38% 35%,
        #8fd4e8 0%,
        #47afd1 35%,
        #2278a0 65%,
        #0d2e3e 100%
      );
    }
    .orb-wrapper.talking .orb-glow {
      opacity: 1;
      animation: glow-talk 0.9s ease-in-out infinite alternate;
      background: radial-gradient(circle, rgba(71,175,209,0.35) 0%, transparent 65%);
    }
    .orb-wrapper.talking .orb-ripple {
      animation: ripple-out 1.1s ease-out infinite;
      border-color: rgba(71,175,209,0.4);
    }
    /* second ripple ring for talking */
    .orb-wrapper.talking .orb-ripple-2 {
      animation: ripple-out 1.1s ease-out infinite 0.55s;
      border-color: rgba(71,175,209,0.25);
    }

    @keyframes orb-talk {
      0%   { transform: scale(1.0);  box-shadow: 0 0 40px 10px rgba(71,175,209,0.4),  inset 0 -8px 24px rgba(0,0,0,0.4), inset 0 4px 12px rgba(255,255,255,0.18); }
      100% { transform: scale(1.10); box-shadow: 0 0 72px 22px rgba(71,175,209,0.6), inset 0 -8px 24px rgba(0,0,0,0.4), inset 0 4px 12px rgba(255,255,255,0.18); }
    }
    @keyframes glow-talk {
      0%   { opacity: 0.8; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.08); }
    }

    /* ── second ripple ring element (always present, animated only in talking) ── */
    .orb-ripple-2 {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid transparent;
      opacity: 0;
      transform: scale(1);
    }

    /* ── STATUS LABEL ── */
    .orb-label {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      margin-top: 24px;
      transition: color 0.4s ease;
      text-align: center;
    }
    .orb-wrapper.listening ~ .orb-label { color: rgba(100,200,230,0.8); }
    .orb-wrapper.talking   ~ .orb-label { color: rgba(100,200,230,1); }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
    }
    .btn-idle      { background: #1e2a35; color: rgba(255,255,255,0.7); border: 1px solid #2a3d4d; }
    .btn-listen    { background: #1a3a4a; color: #7dc4d8; border: 1px solid #3d96b8; }
    .btn-talk      { background: #0f2d3d; color: #47afd1; border: 1px solid #47afd1; }
    .btn.active    { filter: brightness(1.3); box-shadow: 0 0 16px rgba(52,125,155,0.4); }
    .btn:hover     { filter: brightness(1.15); }

    /* ── PANEL PREVIEW (shows orb inside the actual widget panel) ── */
    .panel-preview {
      background: #fff;
      border-radius: 20px;
      width: 340px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .panel-header {
      background: linear-gradient(135deg, #347D9B 0%, #347D9Bdd 100%);
      color: white;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header-left { display: flex; align-items: center; gap: 10px; }
    .panel-header-icon {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .panel-header h4 { font-size: 16px; font-weight: 600; margin: 0; }
    .panel-header p  { font-size: 12px; opacity: 0.85; margin: 2px 0 0; }
    .panel-close { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

    /* tabs */
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid #E5E7EB;
      background: #fff;
    }
    .panel-tab {
      flex: 1;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      color: #9CA3AF;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s ease;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
    }
    .panel-tab.active {
      color: #347D9B;
      border-bottom: 3px solid #347D9B;
    }

    /* voice content */
    .panel-body {
      padding: 28px 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fff;
      min-height: 220px;
    }

    /* mini orb inside panel */
    .mini-orb-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .mini-orb-glow {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(52,125,155,0.18) 0%, transparent 70%);
      opacity: 1;
      animation: glow-idle 4s ease-in-out infinite;
    }
    .mini-orb-ripple, .mini-orb-ripple-2 {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1.5px solid rgba(52,125,155,0.25);
      opacity: 0;
    }
    .mini-orb-core {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #5aafc7 0%, #347D9B 40%, #1b5470 75%, #0d2e3e 100%);
      box-shadow: 0 0 24px 4px rgba(52,125,155,0.25), inset 0 -5px 16px rgba(0,0,0,0.4), inset 0 3px 8px rgba(255,255,255,0.12);
      animation: orb-idle 4s ease-in-out infinite;
    }
    .mini-orb-core::before {
      content: '';
      position: absolute;
      top: 9px; left: 14px;
      width: 20px; height: 13px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      filter: blur(3px);
      transform: rotate(-30deg);
    }
    .mini-orb-core::after {
      content: '';
      position: absolute;
      top: 14px; left: 18px;
      width: 8px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      filter: blur(1.5px);
      transform: rotate(-20deg);
    }

    .mini-call-btn {
      padding: 10px 32px;
      border-radius: 999px;
      background: #347D9B;
      color: white;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .mini-call-btn:hover { background: #2a6480; }

    .panel-footer {
      padding: 10px;
      text-align: center;
      border-top: 1px solid #F3F4F6;
      background: #FAFAFA;
    }
    .panel-footer a { font-size: 11px; color: #9CA3AF; text-decoration: none; }

    /* section label */
    .section-title {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      align-self: flex-start;
    }
  </style>
</head>
<body>

  <!-- ── LARGE ORB DEMO ── -->
  <p class="section-title">Orb States</p>

  <div style="display:flex; gap:64px; align-items:flex-end;">

    <!-- IDLE -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="orb-wrapper idle" id="orb-idle">
        <div class="orb-glow"></div>
        <div class="orb-ripple"></div>
        <div class="orb-ripple-2"></div>
        <div class="orb-core"></div>
      </div>
      <span class="orb-label">Idle</span>
    </div>

    <!-- LISTENING -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="orb-wrapper listening" id="orb-listen">
        <div class="orb-glow"></div>
        <div class="orb-ripple"></div>
        <div class="orb-ripple-2"></div>
        <div class="orb-core"></div>
      </div>
      <span class="orb-label">Listening</span>
    </div>

    <!-- TALKING -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="orb-wrapper talking" id="orb-talk">
        <div class="orb-glow"></div>
        <div class="orb-ripple"></div>
        <div class="orb-ripple-2"></div>
        <div class="orb-core"></div>
      </div>
      <span class="orb-label">Talking</span>
    </div>

  </div>

  <!-- ── INTERACTIVE SINGLE ORB ── -->
  <p class="section-title" style="margin-top:16px;">Interactive — click to switch state</p>

  <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
    <div class="orb-wrapper idle" id="live-orb">
      <div class="orb-glow"></div>
      <div class="orb-ripple"></div>
      <div class="orb-ripple-2"></div>
      <div class="orb-core"></div>
    </div>
    <div class="orb-label" id="live-label" style="margin-top:16px;">Idle</div>
  </div>

  <div class="controls">
    <button class="btn btn-idle active" id="btn-idle" onclick="setState('idle')">Idle</button>
    <button class="btn btn-listen" id="btn-listen" onclick="setState('listening')">Listening</button>
    <button class="btn btn-talk" id="btn-talk" onclick="setState('talking')">Talking</button>
  </div>

  <!-- ── WIDGET PANEL PREVIEW ── -->
  <p class="section-title">Inside the Widget Panel</p>

  <div class="panel-preview">
    <div class="panel-header">
      <div class="panel-header-left">
        <div class="panel-header-icon">🤖</div>
        <div>
          <h4>AI Assistant</h4>
          <p>Voice &amp; Chat Support</p>
        </div>
      </div>
      <button class="panel-close">✕</button>
    </div>

    <div class="panel-tabs">
      <button class="panel-tab active">Web Call</button>
      <button class="panel-tab">Chat</button>
    </div>

    <div class="panel-body">
      <div class="mini-orb-wrapper">
        <div class="mini-orb-glow"></div>
        <div class="mini-orb-ripple"></div>
        <div class="mini-orb-ripple-2"></div>
        <div class="mini-orb-core"></div>
      </div>
      <button class="mini-call-btn">Start Call</button>
    </div>

    <div class="panel-footer">
      <a href="#">Powered by FluvioAI</a>
    </div>
  </div>

  <script>
    const liveOrb   = document.getElementById('live-orb');
    const liveLabel = document.getElementById('live-label');
    const buttons   = { idle: document.getElementById('btn-idle'), listening: document.getElementById('btn-listen'), talking: document.getElementById('btn-talk') };
    const labels    = { idle: 'Idle', listening: 'Listening', talking: 'Talking' };

    function setState(state) {
      liveOrb.className = 'orb-wrapper ' + state;
      liveLabel.textContent = labels[state];
      Object.entries(buttons).forEach(([k, btn]) => btn.classList.toggle('active', k === state));
    }

    // Auto-cycle demo on load
    const cycle = ['idle', 'listening', 'talking'];
    let idx = 0;
    setInterval(() => {
      idx = (idx + 1) % cycle.length;
      setState(cycle[idx]);
    }, 3000);
  </script>

</body>
</html>
